        <div style="background-color: silver; width: 992px;">
         <span style="color:maroon; font-size: 1.5cm;">Znacznik DIV(blok 1)-->Lishka<span>
         <p style="font-size: 1.1cm;"><u><b>Element blokowy(DIV)</b></u> jest elementem blokowym może zawierać wewnątrz siebie zwykły tekst, jak również inne elementy blokower. Został on pomyślany do tworzenia obszerniejszych struktur.</p>
         <ul type="square" style="color:purple; font-size:0.7mm;">
            Zastosowanie DIV
            <li>Z div'a powinno się korzystać kiedy potrzebujemy wyodrębnić poszczególne bloki w układzie dokumentu, na przykład lewa kolumna, menu nawigacyjne,stopka.</li>
            <li>Słiży do utworzenia sekcji (bloku) w pliku HTML w celu ich sformatowania za pomocą akrusza stylów CSS.</li>
         </ul>
        </div>
        <div style="width: 1092px; background-color: red;">
            <span style="color: silver; font-size: 1cm;">Znacznik SPAN(blok 2)-->23.03.2026 16:01</span>
            <ul style="color:purple; font-size: 8mm" type="dot" >
                <li><u><b>Elementy wyswietlanie w linii (SPAN)</b></u> jest elementem liniowym nie moga zawierac elementow blokowych, ale moga inne elementy wyswietlane w linii oraz zwykly tekst</li>
                <li>Jesly chcemy w paragrafie czesc tekstu wyroznic czerwonym kolorem, do wyobdrebnienia tego tekstu nie mozemy uzyc elementu div(paragraf z zasady nie moze zawierac elementow blokowych) tylko span. Wewnatrz DIV mozna oczywiscie wpisac rowniez SPAN.</li>
            </ul>
        </div>
        <div style="width:1192px; background-color:maroon;">
            <span style="color:silver; font-size: 9mm;">Roznica miedzy znacznikami DIV i SPAN (blok 3)-->1P</span>
            <ul style="color:purple; font-size: 7mm;" type="circle">
                <li>Span'em wyodrebniamy elementy liniowe(najczesciej fragmenty tekstu) a divem blokowe elementy, wiekdze fragmenty struktury skladajace sie na uklad strony.</li>
                <li>Dodatkowo DIV domyslnie jest wyswietlany w bloku. natomiast SPAN w linii.</li>
            </ul>
