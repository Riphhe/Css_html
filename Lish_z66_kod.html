<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naza Lishka zadanie 66</title>
</head>
<body>
    <p style="font-weight: bold; font-size: 20pt;">Pseudoelementem :first-line, który obejmuje formatowaniem całą
pierwszą linię.</p>
<textarea cols="20" rows="13"> 
    p
 {
color:navy;
 font-size:12pt;
 }
p:first-line
 {
color:red;
 font-size:20pt;
font-weight:bold;
}
</ textarea>
   <p style="font-weight: bold; font-size: 15pt;">pseudoelementy: :after oraz :before.</p>
<p style="font-size: 13pt;">Poza :first-letter oraz :first-line w specyfikacji umieszczono jeszcze dwa inne
<b>pseudoelementy: :after oraz :before.</b> Oba elementy służą do umieszczania tekstu przed i za
formatowanym elementem strony. Poniżej zamieszczam odpowiedni przykład.</p>
<textarea cols="25" rows="16"> 
p:before
 {
content:"TO SĄ ĆWICZENIA";
font-size:15pt;
font-style:italic;
font-weight:bold;
 }
p:after
 {
content:"AUTOR Król Lew";
 font-size:15pt;
font-style:italic;
font-weight:bold;
}
</ textarea>
   <p style="font-weight: bold; font-size: 18pt;">Pseudoelement :first-letter</p>
<p style="font-size: 13pt;">pozwala na formatowanie pierwszej litery w bloku
tekstu.
Przykładowy arkusz spowoduje powiększenie pierwszej litery do wielkości 100 punktów i
nadanie jej koloru czerwonego.
</p>
<textarea cols="20" rows="13"> 
p
 {
color:navy;
 font-size:30pt;
 }
p:first-letter
 {
color:red;
font-size:100pt;
 }
</ textarea>
</body>
</html>
<!--Nazar Lishka-->
</textarea>
